<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo List</title>
    <style>
      /* html i js su custom, stil je uradio css */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e293b, #0f172a);
      }

      .container {
        min-height: 250px;
        width: 90%;
        max-width: 600px;
        display: flex;
        align-items: center;
        flex-direction: column;
        padding: 30px 25px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        gap: 20px;
      }

      .container > div:first-child {
        width: 100%;
        display: flex;
        gap: 12px;
      }

      #inputTask {
        flex: 1;
        height: 52px;
        font-size: 18px;
        padding: 0 16px;
        border: none;
        outline: none;
        border-radius: 12px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #111827;
        box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      #inputTask::placeholder {
        color: #6b7280;
      }

      #submitBtn {
        padding: 0 22px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        background: linear-gradient(135deg, #f59e0b, #f97316);
        color: white;
        transition: 0.25s ease;
        box-shadow: 0 8px 20px rgba(249, 115, 22, 0.35);
      }

      #submitBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(249, 115, 22, 0.45);
      }

      #submitBtn:active {
        transform: scale(0.97);
      }

      .tsk {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        color: #111827;
        font-size: 17px;
        font-weight: 500;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        animation: fadeIn 0.25s ease;
        margin-top: 8px;
      }

      .tsk button {
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        font-weight: bold;
        transition: 0.2s ease;
      }

      .tsk button:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 18px rgba(34, 197, 94, 0.35);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .container {
          width: 92%;
          padding: 20px 15px;
        }

        .container > div:first-child {
          flex-direction: column;
        }

        #inputTask,
        #submitBtn {
          width: 100%;
        }

        #submitBtn {
          height: 48px;
        }

        .tsk {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .tsk button {
          align-self: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>
        <input type="text" id="inputTask" /><button
          id="submitBtn"
          onclick="submitForm()"
        >
          Add
        </button>
      </div>
    </div>

    <script>
      function submitForm() {
        let input = document.querySelector("#inputTask").value;

        let task = document.createElement("div");
        task.className = "tsk";
        task.innerHTML = `<span>${input}<span><button onClick="removeElement()">Done</button>`;
        let container = document.querySelector(".container");
        container.appendChild(task);

        document.querySelector("#inputTask").value = "";
      }

      function removeElement() {
        let task = document.querySelector(".tsk");
        task.remove();
      }
    </script>
  </body>
</html>
